[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
verbosity = 2
fs_permissions = [{ access = "read", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
mantle = "${MANTLE_RPC_URL}"
mantle_sepolia = "https://rpc.sepolia.mantle.xyz"

[etherscan]
# Etherscan V2 unified API — one key works for all chains incl. Mantle.
# Get a free key at https://etherscan.io/apis (or https://mantlescan.xyz/myapikey).
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=5000", chain = 5000 }
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=5003", chain = 5003 }
