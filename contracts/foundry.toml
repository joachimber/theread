[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
verbosity = 2
fs_permissions = [{ access = "read", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
mantle = "${MANTLE_RPC_URL}"
mantle_sepolia = "https://rpc.sepolia.mantle.xyz"

[etherscan]
# Mantle's block explorer is mantlescan.xyz — get a free key at https://mantlescan.xyz/myapikey
# (Etherscan v2 keys also work since Mantlescan is in the unified-API allowlist.)
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.mantlescan.xyz/api", chain = 5000 }
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api", chain = 5003 }
